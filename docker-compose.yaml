services:
  telemt:
    image: whn0thacked/telemt-docker:3.3.18
    container_name: telemt
    restart: unless-stopped

    environment:
      RUST_LOG: "info"

    volumes:
      - ./telemt.toml:/etc/telemt.toml:ro

    ports:
      - "443:443/tcp"
      - "127.0.0.1:9090:9090/tcp"

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m

    #network_mode: host

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
